name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bun x playwright install --with-deps

      - name: Run E2E tests
        run: bun run e2e
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  deploy:
    name: Deploy to CapRover
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CapRover CLI
        run: npm install -g caprover

      - name: Deploy App
        run: caprover deploy -h "${{ secrets.CAPROVER_SERVER_URL }}" -p "${{ secrets.CAPROVER_APP_PASSWORD }}" -a "${{ secrets.CAPROVER_APP_NAME }}" -b main
